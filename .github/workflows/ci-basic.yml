jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: { os: [ubuntu-24.04] }

    env:
      ROCKSDB_LIB_DIR: /usr/lib
      SNAPPY_LIB_DIR: /usr/lib/x86_64-linux-gnu
      CARGO_INCREMENTAL: "0"        # shrink target/ & avoid large caches
      RUSTFLAGS: "-C debuginfo=0"   # cut debug symbol bloat

    steps:
      - uses: actions/checkout@v4

      # Root-cause probe: see what’s already eating disk on the VM
      - name: Find largest directories on root
        run: |
          sudo du -xh --max-depth=1 / | sort -h | tail -n 30
          sudo du -xh --max-depth=2 /usr | sort -h | tail -n 30
          sudo du -xh --max-depth=2 /opt | sort -h | tail -n 30
          sudo du -xh --max-depth=2 /var | sort -h | tail -n 30

      # Safe cleanup of preinstalled SDKs/layers that often bloat the image
      - name: Free disk space (safe defaults)
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/share/dotnet || true
          sudo docker system prune -af || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Install dependencies on Ubuntu
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler librocksdb-dev

      - name: Install formatting & linting tools
        run: rustup component add rustfmt clippy

      - name: Run tests
        run: cargo test --verbose --locked

      - name: Verify working directory is clean
        run: git diff --exit-code

      # Docs are heavy; keep determinism but avoid deps explosion for now
      - name: Run doc check (workspace only)
        run: cargo doc --workspace --no-deps --document-private-items --locked

      - name: Run format check
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

