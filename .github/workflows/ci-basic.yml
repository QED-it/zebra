name: Basic checks

#on: [push, pull_request]
on: [push]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]

    env:
      # Use system-installed RocksDB library instead of building from scratch
      ROCKSDB_LIB_DIR: /usr/lib
      # Use system-installed Snappy library for compression in RocksDB
      SNAPPY_LIB_DIR: /usr/lib/x86_64-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (safe defaults)
        run: |
          df -h
          du -xh --max-depth=1 / | sort -hr | head -n 30
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/share/dotnet || true
          sudo docker system prune -af || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Install dependencies on Ubuntu
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler librocksdb-dev

      - name: Install formatting & linting tools
        run: rustup component add rustfmt clippy

      - name: Run tests
        run: cargo test --verbose --locked

      - name: Verify working directory is clean
        run: git diff --exit-code

      # Docs are heavy; keep determinism but avoid deps explosion for now
      - name: Run doc check (workspace only)
        run: cargo doc --workspace --no-deps --document-private-items --locked

      - name: Run format check
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings
 
      - name: Check for free disk space
        run: |
          df -h
          du -xh --max-depth=1 / | sort -hr | head -n 30
